apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api-deployment
  labels:
    app: todo-api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
      - name: todo-api
        image: {{ .Values.image.repository}}:{{ .Values.image.tag }}
        ports:
        - containerPort: {{ .Values.containerPort }}